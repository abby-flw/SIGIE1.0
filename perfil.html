<!-- perfil.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil de Usuario</title>
  <link rel="icon" href="Assets/logo-sigie1.png" type="image/x-icon" />
  <link rel="stylesheet" href="css/perfil.css">
</head>
<body>
  <!-- VISTA: PERFIL DE USUARIO -->
  <div class="form-view" id="view-profile">
    <div class="form-header">
      <h2 class="form-title">Perfil de Usuario 👤</h2>
      <p class="form-subtitle">Actualiza tu información personal</p>
    </div>

    <div class="form-group">
      <label class="form-label">Nombre(s)<span class="req">*</span></label>
      <div class="input-wrapper">
        <span class="input-icon">👤</span>
        <input type="text" class="form-input" placeholder="Nombre(s)" value="Juan">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Apellido(s)<span class="req">*</span></label>
      <div class="input-wrapper">
        <span class="input-icon">👤</span>
        <input type="text" class="form-input" placeholder="Apellido(s)" value="Pérez">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Correo electrónico <span class="req">*</span></label>
      <div class="input-wrapper">
        <span class="input-icon">✉️</span>
        <input type="email" class="form-input" placeholder="tucorreo@ejemplo.com" value="juanperez@mail.com">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Teléfono</label>
      <div class="input-wrapper">
        <span class="input-icon">📞</span>
        <input type="tel" class="form-input" placeholder="833-123-4567" value="833-987-6543">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Rol</label>
      <select id="rol-profile" name="rol" class="form-input">
        <option selected>Docente</option>
        <option>Tutor</option>
        <option>Enfermera</option>
        <option>Director</option>
        <option>Administrador</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input type="password" class="form-input" placeholder="Nueva contraseña" id="pass-profile">
        <button type="button" class="toggle-password" onclick="togglePass('pass-profile')">👁️</button>
      </div>
    </div>

    <button class="btn-submit" onclick="updateProfile()">💾 Guardar cambios</button>
  </div>

<script src="Js/perfil.js"></script>
<script>showView('login');</script>

</body>
</html>
